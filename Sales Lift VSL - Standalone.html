  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

v>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- SOLUCION -->\n<section class=\"solution\">\n  <div class=\"wrap\">\n    <div class=\"section-head reveal\">\n      <h2>Tu problema no es <span class=\"strike\">tu servicio<\u002Fspan>.<br>Es que no tienes un <em>sistema<\u002Fem> para venderlo.<\u002Fh2>\n    <\u002Fdiv>\n\n    <p class=\"body reveal\" data-d=\"1\">La mayoría de los negocios de servicios crecen empujando: más horas, más publicaciones, más llamadas. Eso te convierte a ti en el cuello de botella.&nbsp;\nUn sistema funciona distinto: capta atención de forma predecible, califica muy bien antes de tener la llamada, y cierra con un proceso que no depende de tu energía del día.<\u002Fp>\n\n    <div class=\"equation reveal\" data-d=\"2\" aria-label=\"Ecuación del sistema\">\n      <div class=\"eq-cell\">\n        <span class=\"t\">Input<\u002Fspan>\n        <span class=\"v\">Marketing predecible<\u002Fspan>\n      <\u002Fdiv>\n      <div class=\"eq-op\">+<\u002Fdiv>\n      <div class=\"eq-cell\">\n        <span class=\"t\">Filtro<\u002Fspan>\n        <span class=\"v\">Setters + calificación<\u002Fspan>\n      <\u002Fdiv>\n      <div class=\"eq-op\">→<\u002Fdiv>\n      <div class=\"eq-cell red\">\n        <span class=\"t\">Output<\u002Fspan>\n        <span class=\"v\">Ventas sin ti<\u002Fspan>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- INCLUDES -->\n<section class=\"includes\">\n  <div class=\"wrap\">\n    <div class=\"section-head reveal\">\n      <h2>Tres piezas. Una sola máquina.<\u002Fh2>\n    <\u002Fdiv>\n\n    <div class=\"cards\">\n      <article class=\"icard reveal\">\n        <span class=\"num\">01 · Marketing<\u002Fspan>\n        <span class=\"icon\" aria-hidden=\"true\">\n          <svg width=\"22\" height=\"22\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.8\" stroke-linecap=\"round\" stroke-linejoin=\"round\">\n            <path d=\"M3 11l18-8-6 18-3-8-9-2z\"><\u002Fpath>\n          <\u002Fsvg>\n        <\u002Fspan>\n        <h3>Tráfico predecible, no impulsos virales<\u002Fh3>\n        <p>Un ecosistema que captura atención todos los días — sin que dependa de que tú publiques a las 11 de la noche.<\u002Fp>\n        <ul class=\"tags\">\n          <li>Instagram<\u002Fli>\n          <li>YouTube<\u002Fli>\n          <li>Follow-me Ads<\u002Fli>\n          <li>Setters<\u002Fli>\n        <\u002Ful>\n      <\u002Farticle>\n\n      <article class=\"icard reveal\" data-d=\"1\">\n        <span class=\"num\">02 · Ventas<\u002Fspan>\n        <span class=\"icon\" aria-hidden=\"true\">\n          <svg width=\"22\" height=\"22\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.8\" stroke-linecap=\"round\" stroke-linejoin=\"round\">\n            <path d=\"M16 2v4M8 2v4M3 10h18M5 6h14a2 2 0 0 1 2 2v12a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2z\"><\u002Fpath>\n            <path d=\"M9 14l2 2 4-4\"><\u002Fpath>\n          <\u002Fsvg>\n        <\u002Fspan>\n        <h3>Un proceso de cierre repetible<\u002Fh3>\n        <p>Guiones probados, closers entrenados y un Airtable con métricas que te dice qué arreglar antes de que duela.<\u002Fp>\n        <ul class=\"tags\">\n          <li>Guiones<\u002Fli>\n          <li>Closers<\u002Fli>\n          <li>Airtable<\u002Fli>\n          <li>Métricas<\u002Fli>\n        <\u002Ful>\n      <\u002Farticle>\n\n      <article class=\"icard reveal\" data-d=\"2\">\n        <span class=\"num\">03 · Acompañamiento<\u002Fspan>\n        <span class=\"icon\" aria-hidden=\"true\">\n          <svg width=\"22\" height=\"22\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.8\" stroke-linecap=\"round\" stroke-linejoin=\"round\">\n            <circle cx=\"12\" cy=\"8\" r=\"4\"><\u002Fcircle>\n            <path d=\"M4 21a8 8 0 0 1 16 0\"><\u002Fpath>\n          <\u002Fsvg>\n        <\u002Fspan>\n        <h3>Sesiones 1:1 con Hugo&nbsp;<\u002Fh3>\n        <p>No es una comunidad ni un grupo masivo. Es Hugo, mirando tu negocio cada semana, en detalle.<\u002Fp>\n        <ul class=\"tags\">\n          <li>1:1 privado<\u002Fli>\n          <li>Acceso directo<\u002Fli>\n        <\u002Ful>\n      <\u002Farticle>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- RESULTADO -->\n<section class=\"resultado\">\n  <div class=\"wrap inner\">\n    <h2 class=\"big reveal\" data-d=\"1\">\n      <span class=\"amount\">$10K/mes<\u002Fspan> no como un pico.\n      <span class=\"floor\">Como tu nuevo piso.<\u002Fspan>\n    <\u002Fh2>\n    <div class=\"markers reveal\" data-d=\"2\">\n      <span>Predecible<\u002Fspan>\n      <span>Sin depender de ti<\u002Fspan>\n      <span>Mes a mes<\u002Fspan>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- FAQ -->\n<section class=\"faq\" id=\"faq\">\n  <div class=\"wrap\">\n    <div class=\"section-head reveal\">\n      <h2>Preguntas <em>frecuentes<\u002Fem><\u002Fh2>\n    <\u002Fdiv>\n\n    <div class=\"faq-list reveal\" data-d=\"1\">\n      <details name=\"faq\" class=\"faq-item\">\n        <summary>\n          <span class=\"q-num\">01<\u002Fspan>\n          <span class=\"q-text\">¿Necesito tener muchos seguidores para que esto funcione?<\u002Fspan>\n          <span class=\"ico\" aria-hidden=\"true\"><\u002Fspan>\n        <\u002Fsummary>\n        <div class=\"a\"><div><p>No. El sistema no depende de tu audiencia actual. Combinamos contenido orgánico con Follow-me Ads para que el alcance no dependa de cuántos seguidores tienes hoy.<\u002Fp><\u002Fdiv><\u002Fdiv>\n      <\u002Fdetails>\n\n      <details name=\"faq\" class=\"faq-item\">\n        <summary>\n          <span class=\"q-num\">02<\u002Fspan>\n          <span class=\"q-text\">¿Qué pasa si nunca tuve un equipo de ventas?<\u002Fspan>\n          <span class=\"ico\" aria-hidden=\"true\"><\u002Fspan>\n        <\u002Fsummary>\n        <div class=\"a\"><div><p>Es exactamente el punto de partida de la mayoría. Parte del programa es instalar los procesos, los guiones y los SOPs para que un setter y un closer puedan operar sin que tú estés en cada conversación.<\u002Fp><\u002Fdiv><\u002Fdiv>\n      <\u002Fdetails>\n\n      <details name=\"faq\" class=\"faq-item\">\n        <summary>\n          <span class=\"q-num\">03<\u002Fspan>\n          <span class=\"q-text\">¿En cuánto tiempo veo resultados?<\u002Fspan>\n          <span class=\"ico\" aria-hidden=\"true\"><\u002Fspan>\n        <\u002Fsummary>\n        <div class=\"a\"><div><p>Depende del punto de partida de tu negocio. Lo que sí es claro: el programa está diseñado para que tengas un sistema de adquisición y ventas funcionando — no una estrategia en papel, sino algo operando en tu negocio real.<\u002Fp><\u002Fdiv><\u002Fdiv>\n      <\u002Fdetails>\n\n      <details name=\"faq\" class=\"faq-item\">\n        <summary>\n          <span class=\"q-num\">04<\u002Fspan>\n          <span class=\"q-text\">Ya probé mentorías y no me funcionaron. ¿Por qué esto sería diferente?<\u002Fspan>\n          <span class=\"ico\" aria-hidden=\"true\"><\u002Fspan>\n        <\u002Fsummary>\n        <div class=\"a\"><div><p>Porque esto no es una mentoría de información. Es implementación. No te enseñamos qué hacer y te dejamos solo — construimos el sistema contigo y ponemos el equipo comercial dentro de tu negocio.<\u002Fp><\u002Fdiv><\u002Fdiv>\n      <\u002Fdetails>\n\n      <details name=\"faq\" class=\"faq-item\">\n        <summary>\n          <span class=\"q-num\">05<\u002Fspan>\n          <span class=\"q-text\">¿Necesito tener un negocio consolidado para entrar?<\u002Fspan>\n          <span class=\"ico\" aria-hidden=\"true\"><\u002Fspan>\n        <\u002Fsummary>\n        <div class=\"a\"><div><p>No necesariamente. Trabajamos tanto con personas que ya tienen clientes y quieren escalar, como con personas que están arrancando y quieren construir desde el principio con la estructura correcta — sin improvisar, sin perder tiempo en lo que no mueve la aguja.<\u002Fp><\u002Fdiv><\u002Fdiv>\n      <\u002Fdetails>\n\n      <details name=\"faq\" class=\"faq-item\">\n        <summary>\n          <span class=\"q-num\">06<\u002Fspan>\n          <span class=\"q-text\">¿Cuánto tiempo me va a demandar a mí?<\u002Fspan>\n          <span class=\"ico\" aria-hidden=\"true\"><\u002Fspan>\n        <\u002Fsummary>\n        <div class=\"a\"><div><p>Las primeras semanas requieren tu participación activa para instalar el sistema. Después el objetivo es exactamente el contrario — que el sistema opere sin que tú estés presente en marketing y ventas.<\u002Fp><\u002Fdiv><\u002Fdiv>\n      <\u002Fdetails>\n\n      <details name=\"faq\" class=\"faq-item\">\n        <summary>\n          <span class=\"q-num\">07<\u002Fspan>\n          <span class=\"q-text\">¿Qué diferencia a Sales Lift de otros programas?<\u002Fspan>\n          <span class=\"ico\" aria-hidden=\"true\"><\u002Fspan>\n        <\u002Fsummary>\n        <div class=\"a\"><div><p>Que no vendemos información — vendemos implementación. La mayoría de los programas te enseñan qué hacer y después te dejan solo. Nosotros construimos el sistema dentro de tu negocio, instalamos el equipo comercial y acompañamos la ejecución hasta que funciona.<\u002Fp><\u002Fdiv><\u002Fdiv>\n      <\u002Fdetails>\n\n      <details name=\"faq\" class=\"faq-item\">\n        <summary>\n          <span class=\"q-num\">08<\u002Fspan>\n          <span class=\"q-text\">¿Cómo empiezo?<\u002Fspan>\n          <span class=\"ico\" aria-hidden=\"true\"><\u002Fspan>\n        <\u002Fsummary>\n        <div class=\"a\"><div><p>El primer paso es conocer el contexto. Revisa nuestro contenido en Instagram y YouTube — ahí explicamos el sistema en profundidad y vas a entender si esto es lo que tu negocio necesita. Si después de verlo sientes que tiene sentido para tu caso, mándanos un DM por Instagram y analizamos tu situación juntos. A partir de ahí, si hay fit real, agendamos una llamada para evaluar tu contexto en detalle y definir si podemos trabajar juntos.<\u002Fp><\u002Fdiv><\u002Fdiv>\n      <\u002Fdetails>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- CTA FINAL -->\n<section class=\"final\" id=\"calificar\">\n  <div class=\"wrap\">\n    <h2 class=\"reveal\" data-d=\"1\">Esto es solo <em>el comienzo<\u002Fem>.<\u002Fh2>\n    <p class=\"sub reveal\" data-d=\"2\">El canal tiene el proceso completo: cómo se construye el sistema, casos reales y los detalles que no caben en este video. Sin teoría. Solo el sistema.<\u002Fp>\n\n    <a href=\"https://www.youtube.com/channel/UCqOvWAxPsz7ieKLxjYU6-XQ\" target=\"_blank\" rel=\"noopener\" class=\"cta-big reveal\" data-d=\"3\">\n      Ver más videos en el canal\n      <span class=\"arrow\" aria-hidden=\"true\">\n        <svg width=\"14\" height=\"14\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.5\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M5 12h14M13 6l6 6-6 6\"><\u002Fpath><\u002Fsvg>\n      <\u002Fspan>\n    <\u002Fa>\n\n    <div class=\"meta reveal\" data-d=\"4\">\n      <span>\n        <svg width=\"14\" height=\"14\" viewBox=\"0 0 24 24\" fill=\"currentColor\" aria-hidden=\"true\"><path d=\"M21.6 7.2a2.5 2.5 0 0 0-1.76-1.77C18.25 5 12 5 12 5s-6.25 0-7.84.43A2.5 2.5 0 0 0 2.4 7.2 26.2 26.2 0 0 0 2 12a26.2 26.2 0 0 0 .4 4.8 2.5 2.5 0 0 0 1.76 1.77C5.75 19 12 19 12 19s6.25 0 7.84-.43a2.5 2.5 0 0 0 1.76-1.77A26.2 26.2 0 0 0 22 12a26.2 26.2 0 0 0-.4-4.8ZM10 15V9l5.2 3L10 15Z\"><\u002Fpath><\u002Fsvg>\n        Videos nuevos cada semana\n      <\u002Fspan>\n      <span class=\"sep\"><\u002Fspan>\n      <span>Sin teoría — solo el sistema<\u002Fspan>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- FOOTER -->\n<footer class=\"site\">\n  <div class=\"wrap\" style=\"display:flex;align-items:center;justify-content:space-between;gap:16px;flex-wrap:wrap\">\n    <a href=\"https://www.youtube.com/channel/UCqOvWAxPsz7ieKLxjYU6-XQ\" target=\"_blank\" rel=\"noopener\" class=\"logo\">\n      <span class=\"mark\" aria-hidden=\"true\"><\u002Fspan>\n      Sales Lift\n    <\u002Fa>\n    <span>© 2026 Sales Lift · Todos los derechos reservados<\u002Fspan>\n  <\u002Fdiv>\n<\u002Ffooter>\n\n<script>\n  // header shadow on scroll\n  const hdr = document.getElementById('siteHeader');\n  const onScroll = () => hdr.classList.toggle('scrolled', window.scrollY > 4);\n  window.addEventListener('scroll', onScroll, {passive:true});\n  onScroll();\n\n  // reveal on scroll\n  const io = new IntersectionObserver((entries) => {\n    for (const e of entries) {\n      if (e.isIntersecting) {\n        e.target.classList.add('in');\n        io.unobserve(e.target);\n      }\n    }\n  }, { threshold: 0.12, rootMargin: \"0px 0px -40px 0px\" });\n  document.querySelectorAll('.reveal').forEach(el => io.observe(el));\n\n  // simulated video progress bar\n  const bar = document.querySelector('.video-time .bar i');\n  if (bar) {\n    let p = 18;\n    setInterval(() => {\n      p = (p + 0.4) % 100;\n      bar.style.width = p + '%';\n    }, 200);\n  }\n\n  // play button — carga el iframe de YouTube al hacer click\n  const videoAspect = document.querySelector('.video-aspect[data-yt]');\n  if (videoAspect) {\n    const loadYouTube = () => {\n      const id = videoAspect.getAttribute('data-yt');\n      if (!id || videoAspect.dataset.loaded === '1') return;\n      videoAspect.dataset.loaded = '1';\n      const iframe = document.createElement('iframe');\n      // youtube-nocookie + autoplay (gesture explícito del click lo permite); fallback a watch?v= si falla\n      iframe.src = `https://www.youtube-nocookie.com/embed/${id}?autoplay=1&rel=0&modestbranding=1&playsinline=1`;\n      iframe.title = 'Sales Lift VSL';\n      iframe.allow = 'accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share; fullscreen';\n      iframe.allowFullscreen = true;\n      iframe.referrerPolicy = 'strict-origin-when-cross-origin';\n      iframe.style.cssText = 'position:absolute;inset:0;width:100%;height:100%;border:0;z-index:5
